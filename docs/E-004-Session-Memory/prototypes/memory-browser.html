<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session Memory - Memory Browser</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --danger: #f85149;
      --ok: #2ea043;
      --warning: #d29922;
      --purple: #a371f7;
      --border: rgba(240, 246, 252, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: radial-gradient(1400px 900px at 10% 50%, rgba(163, 113, 247, 0.12), transparent 60%),
                  radial-gradient(1200px 800px at 90% 80%, rgba(88, 166, 255, 0.10), transparent 65%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #1f6feb);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      color: #fff;
    }
    .logo-text h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .logo-text p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
    }
    .nav-links {
      display: flex;
      gap: 12px;
    }
    .nav-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
    }
    .nav-link:hover { text-decoration: underline; }

    /* Main layout */
    .main-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      min-height: calc(100vh - 200px);
    }

    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 12px 12px 12px 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
    }
    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .search-box::before {
      content: "⌕";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
    }

    /* Tree view */
    .tree-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .tree-header {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tree-content {
      padding: 8px;
      max-height: 400px;
      overflow-y: auto;
    }
    .tree-item {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
      margin-bottom: 2px;
    }
    .tree-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .tree-item.selected {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
    }
    .tree-item.folder {
      font-weight: 500;
    }
    .tree-item .icon {
      font-size: 14px;
      width: 18px;
      text-align: center;
    }
    .tree-item .count {
      font-size: 10px;
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: auto;
    }
    .tree-children {
      margin-left: 18px;
      border-left: 1px solid var(--border);
      padding-left: 4px;
    }
    .tree-children.collapsed {
      display: none;
    }

    /* Content area */
    .content-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .content-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .content-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .content-title {
      font-size: 16px;
      font-weight: 600;
    }
    .content-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      padding: 6px 12px;
      font-size: 11px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Memory list */
    .memory-list {
      max-height: 300px;
      overflow-y: auto;
    }
    .memory-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }
    .memory-item:last-child {
      border-bottom: none;
    }
    .memory-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .memory-item.selected {
      background: rgba(88, 166, 255, 0.1);
    }
    .memory-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .memory-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .memory-date {
      font-size: 11px;
      color: var(--muted);
    }
    .memory-preview {
      font-size: 12px;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .memory-tags {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
    }
    .tag.high-gdi {
      background: rgba(46, 160, 67, 0.15);
      color: var(--ok);
    }
    .tag.recent {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
    }

    /* Preview area */
    .preview-area {
      padding: 16px;
    }
    .preview-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .preview-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .preview-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 16px;
    }
    .preview-stats {
      display: flex;
      gap: 12px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      font-size: 12px;
    }
    .stat-pill .value {
      font-weight: 600;
    }
    .stat-pill.gdi .value { color: var(--ok); }
    .stat-pill.usage .value { color: var(--accent); }

    .preview-section {
      margin-bottom: 16px;
    }
    .preview-section h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .preview-content {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }
    .preview-code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    /* Keywords */
    .keywords-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .keyword {
      padding: 4px 10px;
      background: rgba(163, 113, 247, 0.15);
      color: var(--purple);
      border-radius: 4px;
      font-size: 11px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    /* State switcher */
    .status-switcher {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .status-btn {
      padding: 6px 12px;
      font-size: 11px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .status-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .status-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
      .tree-content { max-height: 250px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">MEM</div>
        <div class="logo-text">
          <h1>Memory Browser</h1>
          <p>Browse and explore session memories</p>
        </div>
      </div>
      <div class="nav-links">
        <a href="session-recorder.html" class="nav-link">Session Recorder</a>
        <a href="action-log.html" class="nav-link">Action Log</a>
        <a href="feedback-ui.html" class="nav-link">Feedback</a>
      </div>
    </div>

    <div style="margin-bottom: 16px; display: flex; justify-content: flex-end;">
      <div class="status-switcher">
        <button class="status-btn active" data-state="normal">Normal</button>
        <button class="status-btn" data-state="loading">Loading</button>
        <button class="status-btn" data-state="empty">Empty</button>
      </div>
    </div>

    <div class="main-layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="search-box">
          <input type="text" placeholder="Search memories..." id="searchInput">
        </div>

        <div class="tree-card">
          <div class="tree-header">
            <span>Memory Tree</span>
            <span style="font-size: 10px; color: var(--muted);">3 folders</span>
          </div>
          <div class="tree-content" id="treeContent">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- Content Area -->
      <div class="content-area">
        <!-- Memory List -->
        <div class="content-card">
          <div class="content-header">
            <span class="content-title" id="listTitle">sessions/</span>
            <div class="content-actions">
              <button class="action-btn">Sort by Date</button>
              <button class="action-btn">Sort by GDI</button>
            </div>
          </div>
          <div class="memory-list" id="memoryList">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Preview -->
        <div class="content-card">
          <div class="content-header">
            <span class="content-title">Memory Preview</span>
            <div class="content-actions">
              <button class="action-btn">View Raw</button>
              <button class="action-btn primary">Export</button>
            </div>
          </div>
          <div class="preview-area" id="previewArea">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div style="margin-top: 24px; text-align: center; font-size: 12px; color: var(--muted);">
      <p>Session Memory System v1.0 - Explore stored memories and experiences</p>
    </div>
  </div>

  <script>
    // Mock folder structure
    const folders = [
      {
        name: 'sessions',
        icon: '📁',
        children: [
          { name: '2026-02', count: 12 },
          { name: '2026-01', count: 8 }
        ]
      },
      {
        name: 'memory',
        icon: '🧠',
        children: [
          { name: 'patterns', count: 15 },
          { name: 'decisions', count: 7 },
          { name: 'solutions', count: 23 }
        ]
      },
      {
        name: 'pending',
        icon: '⏳',
        children: [
          { name: 'review', count: 4 },
          { name: 'validation', count: 2 }
        ]
      }
    ];

    // Mock memory data
    const memories = {
      'sessions': [
        {
          id: 'mem_001',
          name: 'sess_20260223_001.json',
          date: '2026-02-23',
          preview: 'PostgreSQL connection timeout repair session with successful outcome',
          tags: ['high-gdi', 'recent'],
          gdi: 0.92,
          usage: 5,
          type: 'session',
          keywords: ['postgresql', 'timeout', 'connection-pool'],
          content: {
            summary: 'Agent successfully diagnosed and fixed a PostgreSQL connection timeout issue in production environment.',
            problem: 'Production database connections were timing out after 30 seconds, causing service degradation.',
            solution: 'Reduced connectionTimeoutMillis from 30000ms to 5000ms and added connection validation query.',
            outcome: 'Connection timeouts resolved. Average query response time improved by 40%.',
            raw: `{
  "sessionId": "sess_20260223_001",
  "timestamp": "2026-02-23T10:30:00Z",
  "agent": "agent_0x8f3a2b",
  "problem": "PostgreSQL connection timeout",
  "solution": "Reduce pool timeout",
  "gdi": 0.92,
  "actions": [
    { "type": "read_file", "path": "/config/database.js" },
    { "type": "edit_file", "path": "/config/database.js" },
    { "type": "run_tests", "result": "passed" }
  ]
}`
          }
        },
        {
          id: 'mem_002',
          name: 'sess_20260223_002.json',
          date: '2026-02-23',
          preview: 'JWT authentication debugging session with multiple iterations',
          tags: ['recent'],
          gdi: 0.78,
          usage: 3,
          type: 'session',
          keywords: ['jwt', 'authentication', 'token'],
          content: {
            summary: 'Debugging session for JWT authentication issues returning 401 errors.',
            problem: 'JWT authentication was returning 401 errors for valid tokens.',
            solution: 'Fixed token verification logic and updated secret key rotation.',
            outcome: 'Authentication working correctly. Token validation success rate at 99.9%.',
            raw: `{
  "sessionId": "sess_20260223_002",
  "timestamp": "2026-02-23T09:15:00Z",
  "agent": "agent_0x4c7d1e",
  "problem": "JWT 401 errors",
  "solution": "Fix token verification",
  "gdi": 0.78
}`
          }
        },
        {
          id: 'mem_003',
          name: 'sess_20260222_001.json',
          date: '2026-02-22',
          preview: 'TypeError diagnosis for undefined property access',
          tags: ['high-gdi'],
          gdi: 0.85,
          usage: 2,
          type: 'session',
          keywords: ['TypeError', 'undefined', 'debugging'],
          content: {
            summary: 'Quick diagnosis and fix for TypeError caused by undefined property access.',
            problem: 'TypeError: Cannot read property of undefined in user handler.',
            solution: 'Added null checks and optional chaining for nested object access.',
            outcome: 'Error resolved. Added defensive coding patterns to prevent recurrence.',
            raw: `{
  "sessionId": "sess_20260222_001",
  "timestamp": "2026-02-22T14:00:00Z",
  "problem": "TypeError undefined property",
  "solution": "Add null checks",
  "gdi": 0.85
}`
          }
        }
      ],
      'memory': [
        {
          id: 'mem_004',
          name: 'pattern_timeout_fix.md',
          date: '2026-02-22',
          preview: 'Pattern: Connection timeout diagnosis and resolution',
          tags: ['high-gdi'],
          gdi: 0.91,
          usage: 8,
          type: 'pattern',
          keywords: ['timeout', 'connection', 'pattern', 'diagnosis'],
          content: {
            summary: 'Reusable pattern for diagnosing and fixing connection timeout issues.',
            problem: 'Connection timeouts are a common production issue that requires systematic diagnosis.',
            solution: 'Follow the timeout diagnosis pattern: check config, verify pool settings, test with reduced values.',
            outcome: 'This pattern has been successfully applied to 8 different timeout scenarios.',
            raw: `# Connection Timeout Pattern

## Diagnosis Steps
1. Check connection pool configuration
2. Verify network connectivity
3. Test with reduced timeout values
4. Add connection validation

## Recommended Values
- connectionTimeout: 5000ms
- idleTimeout: 10000ms
- maxConnections: based on load

## GDI Score: 0.91`
          }
        },
        {
          id: 'mem_005',
          name: 'decision_jwt_auth.md',
          date: '2026-02-21',
          preview: 'Decision record: JWT authentication strategy selection',
          tags: [],
          gdi: 0.75,
          usage: 4,
          type: 'decision',
          keywords: ['jwt', 'authentication', 'strategy', 'security'],
          content: {
            summary: 'Decision record for choosing JWT over session-based authentication.',
            problem: 'Need to select an authentication strategy for the new API.',
            solution: 'Chose JWT with refresh tokens for stateless, scalable authentication.',
            outcome: 'Implemented and working well with mobile and web clients.',
            raw: `# Authentication Strategy Decision

## Options Considered
1. Session-based auth
2. JWT with refresh tokens
3. OAuth 2.0

## Decision
JWT with refresh tokens

## Rationale
- Stateless and scalable
- Works well with microservices
- Mobile-friendly`
          }
        }
      ],
      'pending': [
        {
          id: 'mem_006',
          name: 'pending_review_001.json',
          date: '2026-02-23',
          preview: 'Pending review: Service mesh configuration changes',
          tags: ['recent'],
          gdi: null,
          usage: 0,
          type: 'pending',
          keywords: ['service-mesh', 'istio', 'configuration'],
          content: {
            summary: 'Pending review for service mesh configuration changes that need validation.',
            problem: 'Service mesh routing rules need optimization.',
            solution: 'Proposed changes to Istio virtual service configuration.',
            outcome: 'Awaiting review and testing.',
            raw: `{
  "status": "pending_review",
  "changes": [
    "Update virtual service routing",
    "Add circuit breaker config",
    "Enable retry policy"
  ],
  "submitted": "2026-02-23T11:00:00Z"
}`
          }
        }
      ]
    };

    let selectedFolder = 'sessions';
    let selectedMemory = null;
    let currentState = 'normal';
    let searchQuery = '';

    // Render folder tree
    function renderTree() {
      const treeEl = document.getElementById('treeContent');

      treeEl.innerHTML = folders.map(folder => `
        <div class="tree-item folder ${selectedFolder === folder.name ? 'selected' : ''}" data-folder="${folder.name}">
          <span class="icon">${folder.icon}</span>
          <span>${folder.name}/</span>
          <span class="count">${folder.children.reduce((a, c) => a + c.count, 0)}</span>
        </div>
        <div class="tree-children ${selectedFolder === folder.name ? '' : 'collapsed'}">
          ${folder.children.map(child => `
            <div class="tree-item" data-folder="${folder.name}" data-child="${child.name}">
              <span class="icon">📄</span>
              <span>${child.name}/</span>
              <span class="count">${child.count}</span>
            </div>
          `).join('')}
        </div>
      `).join('');

      // Add click handlers
      document.querySelectorAll('.tree-item.folder').forEach(item => {
        item.addEventListener('click', () => {
          selectedFolder = item.dataset.folder;
          selectedMemory = null;
          renderTree();
          renderMemoryList();
          renderPreview();
        });
      });
    }

    // Render memory list
    function renderMemoryList() {
      const listEl = document.getElementById('memoryList');
      const titleEl = document.getElementById('listTitle');

      titleEl.textContent = selectedFolder + '/';

      if (currentState === 'empty') {
        listEl.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 16v-4M12 8h.01"/>
            </svg>
            <p>No memories found</p>
          </div>
        `;
        return;
      }

      if (currentState === 'loading') {
        listEl.innerHTML = `
          <div class="empty-state">
            <p>Loading memories...</p>
          </div>
        `;
        return;
      }

      let items = memories[selectedFolder] || [];

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        items = Object.values(memories).flat().filter(m =>
          m.name.toLowerCase().includes(q) ||
          m.preview.toLowerCase().includes(q) ||
          m.keywords.some(k => k.toLowerCase().includes(q))
        );
      }

      if (items.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M9 9h6M9 13h6M9 17h4"/>
            </svg>
            <p>No memories in this folder</p>
          </div>
        `;
        return;
      }

      listEl.innerHTML = items.map(mem => `
        <div class="memory-item ${selectedMemory?.id === mem.id ? 'selected' : ''}" data-id="${mem.id}">
          <div class="memory-header">
            <span class="memory-name">${mem.name}</span>
            <span class="memory-date">${mem.date}</span>
          </div>
          <div class="memory-preview">${mem.preview}</div>
          <div class="memory-tags">
            ${mem.tags.map(tag => `<span class="tag ${tag}">${tag.replace('-', ' ')}</span>`).join('')}
            ${mem.gdi ? `<span class="tag">GDI: ${mem.gdi}</span>` : ''}
          </div>
        </div>
      `).join('');

      // Add click handlers
      document.querySelectorAll('.memory-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = item.dataset.id;
          selectedMemory = Object.values(memories).flat().find(m => m.id === id);
          renderMemoryList();
          renderPreview();
        });
      });
    }

    // Render preview
    function renderPreview() {
      const previewEl = document.getElementById('previewArea');

      if (!selectedMemory) {
        previewEl.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <p>Select a memory to preview</p>
          </div>
        `;
        return;
      }

      const mem = selectedMemory;

      previewEl.innerHTML = `
        <div class="preview-header">
          <div>
            <div class="preview-title">${mem.name}</div>
            <div class="preview-meta">
              <span>Created: ${mem.date}</span>
              <span>Type: ${mem.type}</span>
            </div>
          </div>
          <div class="preview-stats">
            ${mem.gdi ? `<div class="stat-pill gdi"><span>GDI:</span><span class="value">${mem.gdi}</span></div>` : ''}
            ${mem.usage !== undefined ? `<div class="stat-pill usage"><span>Used:</span><span class="value">${mem.usage}x</span></div>` : ''}
          </div>
        </div>

        <div class="preview-section">
          <h3>Summary</h3>
          <div class="preview-content">${mem.content.summary}</div>
        </div>

        <div class="preview-section">
          <h3>Problem</h3>
          <div class="preview-content">${mem.content.problem}</div>
        </div>

        <div class="preview-section">
          <h3>Solution</h3>
          <div class="preview-content">${mem.content.solution}</div>
        </div>

        <div class="preview-section">
          <h3>Outcome</h3>
          <div class="preview-content">${mem.content.outcome}</div>
        </div>

        <div class="preview-section">
          <h3>Keywords</h3>
          <div class="keywords-list">
            ${mem.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}
          </div>
        </div>

        <div class="preview-section">
          <h3>Raw Data</h3>
          <div class="preview-code">${mem.content.raw}</div>
        </div>
      `;
    }

    // Search handler
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderMemoryList();
    });

    // State switcher
    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentState = btn.dataset.state;
        renderTree();
        renderMemoryList();
        renderPreview();
      });
    });

    // Initialize
    renderTree();
    renderMemoryList();
    renderPreview();
  </script>
</body>
</html>
